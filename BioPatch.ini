; BioPatch
; Standalone ASI mod for Resident Evil Revelations 2.
; 1 = on, 0 = off.
; Recommended everyday settings are already enabled.

[General]
; Writes scripts\BioPatch\BioPatch.log.
; Leave this on unless you want the mod completely silent.
EnableLog = 1

; Writes a minidump to scripts\BioPatch\crashdumps if the game crashes.
CrashDumps = 1

; Keeps BioPatch's crash handler installed if the game tries to replace it.
ProtectUnhandledExceptionFilter = 1

[Timing]
; Replaces legacy timeGetTime reads with a high precision QPC-backed timer.
HighPrecisionTimeGetTime = 1

; Replaces the game's short Sleep / SleepEx waits with a more precise timer path.
PreciseShortSleep = 1

; Only waits at or below this value use the precise short-sleep path.
; Leave this at 2 unless you are testing timing behavior.
ShortSleepThresholdMs = 2

; Replaces the old UI worker Sleep(1) polling loop with wake-based waits.
OptimizeWorkerStateWait = 1

; Suppresses the worker's old timeBeginPeriod(1) path once the polling loop is fixed.
OptimizeUiThreadTimerPeriod = 1

; Replaces thread-shutdown Sleep + GetExitCodeThread poll loops with direct waits.
OptimizeThreadJoinWait = 1

; Replaces the hot mt-worker Sleep(1) poll loop with WaitOnAddress waits.
OptimizeMtWorkerWait = 1

; Replaces the validated UI-thread Sleep(1) idle loop with a short message wait.
OptimizeUiThreadMessageWait = 1

; Turns the gameplay-observed queue worker Sleep(1) into a pure yield.
OptimizeQueueWorkerYield = 1

; Sends the game's variable pacing sleeps through BioPatch's precise timer path.
OptimizePacingSleepPrecision = 1

; Sends the remaining validated legacy delay thunks through the precise timer path.
OptimizeLegacyDelayPrecision = 1

; Replaces chunk-stream retry Sleep(1) loops with a precise adaptive backoff.
OptimizeStreamRetryBackoff = 1

[Input]
; Skips redundant per-frame ClipCursor calls from the legacy input path.
OptimizeClipCursor = 1

; Collapses the duplicated GetCursorPos pair into one real read plus one cached reuse.
OptimizeGetCursorPosPair = 1

; Suppresses most remaining first-pass GetCursorPos reads when the mouse is idle.
OptimizeIdleGetCursorPos = 1

; Collapses duplicated ScreenToClient calls and skips traced fullscreen no-op cases.
OptimizeScreenToClientPair = 1

; Skips the traced fullscreen ClientToScreen(0,0) no-op path.
OptimizeClientToScreenOrigin = 1

; Caches the duplicated fullscreen GetClientRect pair used by the clip setup path.
OptimizeGetClientRectPair = 1

; Disables the traced QFPS mouse-control lag on the validated live/default camera objects.
DisableQfpsMouseCtrlLag = 1

[Optional]
; Extra mt-worker timer countdown optimization. Usually harmless, but only helps on some workloads.
OptimizeMtWorkerState4TimerWait = 1

; Extra mt-worker teardown wait optimization for a rarer state-9 path.
; Off by default because it is niche and not broadly validated.
OptimizeMtWorkerState9Wait = 0

; Old stream retry experiment that can raise CPU usage. Keep this off.
OptimizeStreamRetryYield = 0

[Diagnostics]
; Logs config.ini reads seen through BioPatch's INI probe.
LogIniTraffic = 0

; Logs the live input/QFPS probe counters and hot input call sites.
LogInputTraffic = 0

; Logs the live timing probe counters and hot Sleep / wait call sites.
LogTimingTraffic = 0

; Logs the D3D9 probe hooks used during renderer investigation.
LogD3D9Traffic = 0

; Dumps the traced hot input block to scripts\BioPatch for reverse-engineering.
DumpHotInputBlock = 0

; Dumps the wider traced input block to scripts\BioPatch for reverse-engineering.
DumpWideInputBlock = 0
